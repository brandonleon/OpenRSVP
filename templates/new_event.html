{% include '_header.html' %}

<body>
    <div class="container mt-5">
        <h1 class="mb-4">Create a New Event</h1>
        <form action="/event" method="POST">
            <div class="mb-3">
                <label for="event_name" class="form-label">Event Name</label>
                <input type="text" class="form-control" id="event_name" placeholder="Enter event name" required>
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="event_date" class="form-label">Event Date</label>
                    <input type="date" class="form-control" id="event_date" required>
                </div>
                <div class="col">
                    <label for="start_time" class="form-label">Start Time</label>
                    <input type="time" class="form-control" id="start_time" required>
                </div>
                <div class="col">
                    <label for="end_time" class="form-label">End Time</label>
                    <input type="time" class="form-control" id="end_time" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="secret_code" class="form-label">Secret Link</label>
                <input type="text" class="form-control" id="secret_code" placeholder="Enter secret link">
            </div>
            <button type="submit" class="btn btn-primary">Create Event</button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
